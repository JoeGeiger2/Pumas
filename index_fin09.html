<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Dokumente – Öffentlicher Ordner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root { color-scheme: light dark; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
      font-size: 1.35rem; /* deutlich größer */
    }

    header {
      background: #0a7;
      color: white;
      padding: 1.6rem 1.6rem;
    }

    h1 {
      font-size: 1.9rem; /* groß */
      margin: 0;
    }

    p {
      margin: 0.8rem 0 1.4rem;
      color: #f0f0f0;
      font-size: 1.3rem;
    }

    main {
      padding: 1.4rem 1.6rem;
      max-width: 900px;
      margin: 0 auto;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      background: white;
      margin: 1rem 0;
      border-radius: 14px;
    }

    a {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1.6rem 1.6rem; /* große Touchfläche */
      text-decoration: none;
      color: #111;
      font-size: 1.45rem; /* sehr groß */
    }

    a:hover {
      background: #eefaf5;
      border-radius: 14px;
    }

    .icon {
      width: 52px;   /* deutlich größer */
      height: 52px;
      display: inline-grid;
      place-items: center;
      border-radius: 10px;
      background: #e8f7f1;
      color: #0a7;
      font-weight: 700;
      font-size: 1.2rem;
    }

    .name {
      flex: 1;
    }

    .meta {
      color: #666;
      font-size: 1.2rem;
    }

    footer {
      padding: 1.6rem;
      color: #666;
      text-align: center;
      font-size: 1.1rem;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #121212; }
      p, .meta, a { color: #eaeaea; }
      li { background: #1a1a1a; }
      a:hover { background: #0f2c26; }
    }
  </style>
</head>

<body>
  <header>
    <h1>Dokumente</h1>
    <p>Öffentlicher Ordner – Tippe zum Öffnen.</p>
  </header>

  <main>
    <ul>

      <!-- PDFs -->
      <li>
        <a href="Aushang - Jahres-Startzeiten 2026.pdf" target="_blank" rel="noopener">
          <span class="icon">PDF</span>
          <span class="name">Abschlagszeiten 2026</span>
          <span class="meta">PDF</span>
        </a>
      </li>

      <li>
        <a href="Programm 2026.pdf" target="_blank" rel="noopener">
          <span class="icon">PDF</span>
          <span class="name">Terminplan Graue Pumas 2026</span>
          <span class="meta">PDF</span>
        </a>
      </li>

      <li>
        <a href="Anlage Pumareise 2026.pdf" target="_blank" rel="noopener">
          <span class="icon">PDF</span>
          <span class="name">Pumareise 2026 – Details</span>
          <span class="meta">PDF</span>
        </a>
      </li>

      <li>
        <a href="Pumareise 2026 - Anmeldeformular.pdf" target="_blank" rel="noopener">
          <span class="icon">PDF</span>
          <span class="name">Pumareise 2026 – Anmeldung</span>
          <span class="meta">PDF</span>
        </a>
      </li>

      <!-- Ordner -->
      <li>
        <a href="Startzeiten/" target="_blank" rel="noopener">
          <span class="icon">DIR</span>
          <span class="name">Startzeiten</span>
          <span class="meta">Ordner</span>
        </a>
      </li>

      <li>
        <a href="Ergebnisse/" target="_blank" rel="noopener">
          <span class="icon">DIR</span>
          <span class="name">Ergebnisse</span>
          <span class="meta">Ordner</span>
        </a>
      </li>

    </ul>
  </main>

  <footer>
    pCloud Public Folder – Index Seite
  </footer>
</body>
</html>
