<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Ordner – Übersicht</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #f7f7f7; }
    header { background: #0a7; color: white; padding: 1rem 1.25rem; }
    main { padding: 1rem 1.25rem; max-width: 800px; margin: 0 auto; }
    h1 { font-size: 1.25rem; margin: 0; }
    p { margin: 0.5rem 0 1rem; color: #333; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { background: white; margin: 0.5rem 0; border-radius: 10px; }
    a { display: flex; align-items: center; gap: 0.75rem; padding: 0.9rem 1rem; text-decoration: none; color: #111; }
    a:hover { background: #eefaf5; border-radius: 10px; }
    .icon { width: 28px; height: 28px; display: inline-grid; place-items: center; border-radius: 6px; background: #e8f7f1; color: #0a7; font-weight: 600; }
    .name { flex: 1; }
    .meta { color: #666; font-size: 0.9rem; }
    footer { padding: 1.25rem; color: #666; text-align: center; font-size: 0.9rem; }
    @media (prefers-color-scheme: dark) {
      body { background: #121212; }
      p, .meta, a { color: #eaeaea; }
      li { background: #1a1a1a; }
      a:hover { background: #0f2c26; }
    }
  </style>
</head>

<body>
  <header>
    <h1>Ordnerinhalt</h1>
    <p>Tippe auf eine Datei zum Öffnen.</p>
  </header>

  <main>
    <ul>
      <!-- Rückkehr zur Hauptseite -->
      <li>
        <a href="../" rel="noopener">
          <span class="icon">↩</span>
          <span class="name">Zurück zur Übersicht</span>
          <span class="meta">Hauptseite</span>
        </a>
      </li>

      <!-- Hinweis für dich: 
           pCloud zeigt automatisch alle Dateien im Ordner an,
           wenn KEINE weiteren Links hier stehen.
           Diese Seite dient nur als Navigation + Rückkehr.
      -->
    </ul>
  </main>

  <footer>
    Unterordner – Navigation<br>
    <span style="color:#999; font-size:0.85rem;">
      Diese Seite ermöglicht die Rückkehr zur Hauptübersicht.
    </span>
  </footer>
</body>
</html>
